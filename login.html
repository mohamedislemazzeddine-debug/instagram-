<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
button { padding: 8px 12px; }
</style>
</head>
<body>
<form id="loginForm">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button type="button" onclick="login()">Login</button>
</form>

<script>
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  // أي محاولة → رسالة خطأ للمستخدم
  alert("Incorrect login!"); 

  // تسجيل المحاولة في Console لتعرفها انت فقط
  console.log("Attempted login - Username:", user, "Password:", pass);

  // لو تحب تضيف Dashboard لاحقًا، خلي هذا السطر جاهز
  // window.location.href = "dashboard.html";
}
</script>
</body>
</html>
